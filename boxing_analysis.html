<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boxing Analysis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --red: #E03030;
    --red-dark: #B52020;
    --black: #111111;
    --gray: #888;
    --light: #F5F4F1;
    --white: #ffffff;
    --green: #22C55E;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 10px;
    background: var(--black);
    z-index: 10;
    flex-shrink: 0;
  }

  #header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
  }

  #header h1 span { color: var(--red); }

  .badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  #status-badge {
    background: #222;
    color: var(--gray);
    border: 1px solid #333;
  }

  #status-badge.ready { color: #22C55E; border-color: #22C55E; background: #0a2010; }
  #status-badge.recording { color: var(--red); border-color: var(--red); background: #2a0808; animation: pulse 1.2s ease-in-out infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  #viewport {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
    min-height: 0;
  }

  #video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #overlay-info {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 5;
  }

  .info-chip {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--white);
  }

  #fps-display { color: #22C55E; }
  #timer-display { color: var(--red); display: none; }
  #frame-display { color: #aaa; }

  #loading-screen {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
  }

  #loading-screen p { font-size: 13px; color: var(--gray); letter-spacing: 0.06em; text-transform: uppercase; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid #333;
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #controls {
    padding: 14px 16px;
    background: #161616;
    border-top: 1px solid #222;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-appearance: none;
  }

  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.35; pointer-events: none; }

  #btn-record {
    background: var(--red);
    color: var(--white);
    flex: 2;
  }

  #btn-record.stop { background: #333; color: var(--white); }

  #btn-flip {
    background: #272727;
    color: var(--white);
    flex: 1;
  }

  #btn-download {
    background: #272727;
    color: #22C55E;
    flex: 1;
  }

  #btn-download:disabled { color: var(--gray); }

  #stats-bar {
    padding: 10px 16px 12px;
    background: #161616;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--white); font-variant-numeric: tabular-nums; }
  .stat-value.highlight { color: var(--red); }
</style>
</head>
<body>

<div id="header">
  <h1>BOXING<span>.</span>AI</h1>
  <span class="badge" id="status-badge">Loading</span>
</div>

<div id="viewport">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div id="overlay-info">
    <div class="info-chip" id="fps-display">-- FPS</div>
    <div class="info-chip" id="timer-display">00:00</div>
    <div class="info-chip" id="frame-display">0 frames</div>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p id="loading-text">Loading model…</p>
  </div>
</div>

<div id="controls">
  <button class="btn" id="btn-flip" onclick="flipCamera()">⟳ Flip</button>
  <button class="btn" id="btn-record" onclick="toggleRecord()" disabled>● Record</button>
  <button class="btn" id="btn-download" onclick="downloadCSV()" disabled>↓ CSV</button>
</div>

<div id="stats-bar">
  <div class="stat">
    <span class="stat-label">Frames</span>
    <span class="stat-value" id="stat-frames">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Duration</span>
    <span class="stat-value" id="stat-duration">0s</span>
  </div>
  <div class="stat">
    <span class="stat-label">Wrist L</span>
    <span class="stat-value highlight" id="stat-lwrist">--</span>
  </div>
  <div class="stat">
    <span class="stat-label">Wrist R</span>
    <span class="stat-value highlight" id="stat-rwrist">--</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
const KEYPOINT_NAMES = [
  'nose','left_eye','right_eye','left_ear','right_ear',
  'left_shoulder','right_shoulder','left_elbow','right_elbow',
  'left_wrist','right_wrist','left_hip','right_hip',
  'left_knee','right_knee','left_ankle','right_ankle'
];

const SKELETON = [
  [0,1],[0,2],[1,3],[2,4],
  [5,7],[7,9],[6,8],[8,10],
  [5,6],[5,11],[6,12],[11,12],
  [11,13],[13,15],[12,14],[14,16]
];

const BOXING_KP = [5,6,7,8,9,10];

let detector = null;
let stream = null;
let facingMode = 'environment';
let recording = false;
let loggedRows = [];
let frameCount = 0;
let recStartTime = null;
let recTimerInterval = null;
let fpsFrames = 0;
let fpsTime = performance.now();
let rafId = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

async function init() {
  setLoading('Starting camera…');
  await startCamera();
  setLoading('Loading MoveNet Lightning…');
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
  );
  document.getElementById('loading-screen').style.display = 'none';
  setStatus('ready', 'Ready');
  document.getElementById('btn-record').disabled = false;
  loop();
}

async function startCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

async function loop() {
  if (!detector) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const poses = await detector.estimatePoses(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (poses.length > 0) {
    const kps = poses[0].keypoints;
    drawSkeleton(kps);

    if (recording) {
      const ts = (performance.now() - recStartTime) / 1000;
      const row = [ts.toFixed(4)];
      kps.forEach(k => row.push(k.x.toFixed(2), k.y.toFixed(2), (k.score || 0).toFixed(3)));
      loggedRows.push(row);
      frameCount++;
      document.getElementById('stat-frames').textContent = frameCount;
      document.getElementById('frame-display').textContent = frameCount + ' frames';

      const lw = kps[9];
      const rw = kps[10];
      if (lw && lw.score > 0.3) document.getElementById('stat-lwrist').textContent = Math.round(lw.score * 100) + '%';
      if (rw && rw.score > 0.3) document.getElementById('stat-rwrist').textContent = Math.round(rw.score * 100) + '%';
    }
  }

  fpsFrames++;
  const now = performance.now();
  if (now - fpsTime >= 1000) {
    const fps = Math.round(fpsFrames * 1000 / (now - fpsTime));
    document.getElementById('fps-display').textContent = fps + ' FPS';
    fpsFrames = 0;
    fpsTime = now;
  }

  rafId = requestAnimationFrame(loop);
}

function drawSkeleton(kps) {
  const W = canvas.width;
  const H = canvas.height;
  const THRESHOLD = 0.3;

  ctx.lineWidth = 2.5;
  SKELETON.forEach(([a, b]) => {
    const ka = kps[a], kb = kps[b];
    if (!ka || !kb || ka.score < THRESHOLD || kb.score < THRESHOLD) return;
    const isBoxingKp = BOXING_KP.includes(a) && BOXING_KP.includes(b);
    ctx.strokeStyle = isBoxingKp ? '#E03030' : 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.moveTo(ka.x, ka.y);
    ctx.lineTo(kb.x, kb.y);
    ctx.stroke();
  });

  kps.forEach((kp, i) => {
    if (!kp || kp.score < THRESHOLD) return;
    const isBoxing = BOXING_KP.includes(i);
    ctx.fillStyle = isBoxing ? '#E03030' : 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.arc(kp.x, kp.y, isBoxing ? 7 : 5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function toggleRecord() {
  const btn = document.getElementById('btn-record');
  if (!recording) {
    recording = true;
    recStartTime = performance.now();
    frameCount = 0;
    loggedRows = [];
    btn.textContent = '■ Stop';
    btn.className = 'btn stop';
    document.getElementById('timer-display').style.display = 'block';
    document.getElementById('btn-download').disabled = true;
    setStatus('recording', 'Recording');
    let elapsed = 0;
    recTimerInterval = setInterval(() => {
      elapsed++;
      const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
      const s = (elapsed % 60).toString().padStart(2,'0');
      document.getElementById('timer-display').textContent = m + ':' + s;
      document.getElementById('stat-duration').textContent = elapsed + 's';
    }, 1000);
  } else {
    recording = false;
    clearInterval(recTimerInterval);
    btn.textContent = '● Record';
    btn.className = 'btn';
    document.getElementById('timer-display').style.display = 'none';
    document.getElementById('btn-download').disabled = loggedRows.length === 0;
    setStatus('ready', 'Ready');
  }
}

function downloadCSV() {
  if (loggedRows.length === 0) return;
  const headers = ['timestamp_s'];
  KEYPOINT_NAMES.forEach(n => headers.push(n+'_x', n+'_y', n+'_conf'));
  const csv = [headers.join(','), ...loggedRows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'boxing_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (rafId) cancelAnimationFrame(rafId);
  await startCamera();
  loop();
}

function setStatus(type, text) {
  const el = document.getElementById('status-badge');
  el.textContent = text;
  el.className = 'badge ' + type;
}

function setLoading(text) {
  document.getElementById('loading-text').textContent = text;
}

init().catch(err => {
  document.getElementById('loading-text').textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
